<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能 Agent｜Campus Lumina</title>
  <link rel="stylesheet" href="/static/styles.css?v=12" />
</head>
<body class="lumina-body agent-body">
  <main class="lumina-stage">
    <section id="chatApp" class="lumina-shell agent-layout chat-app">
      <section class="agent-workspace">
        <aside class="chat-sidebar agent-rail">
          <div class="agent-rail-controls">
            <a class="agent-home-button" href="/" title="返回 Dashboard" aria-label="返回 Dashboard"><span class="lumina-brand-mark" aria-hidden="true"><i></i></span></a>
            <button id="sidebarToggle" class="icon-btn" type="button" title="收起 Agent 侧栏" aria-label="收起 Agent 侧栏">‹</button>
          </div>
          <div class="agent-rail-title">
            <span>Learning workspace</span>
            <h2>学习 Agents</h2>
          </div>

          <div class="agent-options" aria-label="选择学习 Agent">
            <button class="agent-option active" data-domain="programming" data-agent-name="Python 编程助手" type="button">
              <span class="agent-avatar python" aria-hidden="true">&lt;/&gt;</span><span><strong>Python 编程助手</strong><small>教材检索、代码调试与实操</small><em data-agent-recent="programming">暂无使用记录</em></span>
            </button>
            <button class="agent-option" data-domain="math" data-agent-name="数学学习助手" type="button">
              <span class="agent-avatar math" aria-hidden="true">f(x)</span><span><strong>数学学习助手</strong><small>定义推导、公式与分层练习</small><em data-agent-recent="math">暂无使用记录</em></span>
            </button>
            <button class="agent-option" data-domain="politics" data-agent-name="思政学习助手" type="button">
              <span class="agent-avatar politics" aria-hidden="true">书</span><span><strong>思政学习助手</strong><small>教材依据、材料分析与论述</small><em data-agent-recent="politics">暂无使用记录</em></span>
            </button>
            <a class="agent-option custom" href="/assistants">
              <span class="agent-avatar custom" aria-hidden="true">＋</span><span><strong>创建课程助手</strong><small>上传资料建立独立知识空间</small></span>
            </a>
          </div>

          <button id="newChatBtn" class="new-chat-btn" type="button"><span>＋</span> 新建对话</button>

          <div id="historyShell" class="history-shell">
            <div class="history-head"><h3>历史对话</h3></div>
            <div id="historyList" class="history-list empty">暂无历史。</div>
          </div>
        </aside>

        <main class="chat-main agent-chat-main">
          <header class="chat-header agent-chat-header">
            <div class="agent-heading">
              <a class="agent-mobile-home" href="/" title="返回 Dashboard" aria-label="返回 Dashboard"><span class="lumina-brand-mark" aria-hidden="true"><i></i></span></a>
              <div class="active-agent-mark">&lt;/&gt;</div>
              <div>
                <span>当前课程 Agent</span>
                <h1 id="activeAgentName">Python 编程助手</h1>
                <label class="course-picker">课程空间 <select id="courseSelect" aria-label="选择当前课程"></select></label>
                <small id="knowledgeSpaceStatus" class="knowledge-space-status">正在读取知识库状态</small>
              </div>
            </div>
            <div class="agent-header-tools">
              <div class="mode-pills" aria-label="回答模式">
                <button class="mode-pill" data-direct-mode="spark" type="button">Spark X</button>
                <button class="mode-pill active" data-direct-mode="flash" type="button">本地快速</button>
                <button id="modeButton" class="mode-info-btn" type="button" title="查看模式说明">i</button>
              </div>
              <strong id="chatMode" class="current-mode-label">Flash 快速模式</strong>
              <p id="modeHelp" class="sr-only">选择当前回答模式。</p>
              <div class="chat-header-actions">
                <a class="header-icon-link" href="/assistants" title="管理课程助手">＋</a>
                <a class="header-icon-link" href="/profile" title="查看动态学生画像">◌</a>
              </div>
            </div>
          </header>

          <section id="chatMessages" class="chat-messages" aria-live="polite"></section>

          <section id="quickPrompts" class="quick-prompts" aria-label="推荐问题">
            <button data-prompt="Python变量是什么？请直接回答。">变量入门</button>
            <button data-prompt="Python的if判断怎么用？请只讲核心用法，给一个例子。">if 判断</button>
            <button data-prompt="怎么用Python做一个简单的成绩判断小项目？先给我核心思路和最小代码。">项目实操</button>
            <button id="promptRefresh" class="prompt-refresh" type="button" title="更换推荐问题">↻</button>
          </section>

          <form id="chatForm" class="chat-composer">
            <div id="activeToolBar" class="active-tool-bar" hidden><span id="activeToolName"></span><button id="clearToolButton" type="button" aria-label="取消当前工具">×</button></div>
            <div class="input-shell">
              <div class="chat-tool-wrap">
                <button id="toolMenuButton" class="chat-tool-button" type="button" title="学习工具" aria-label="打开学习工具" aria-expanded="false">＋</button>
                <div id="toolMenu" class="chat-tool-menu" hidden>
                  <a href="/assistants?action=upload"><strong>上传资料</strong><small>创建或补充课程知识空间</small></a>
                  <button data-chat-tool="explanation" type="button"><strong>生成讲解文档</strong><small>目标、解释、示例与引用</small></button>
                  <button data-chat-tool="mindmap" type="button"><strong>生成思维导图</strong><small>生成并保存 Mermaid 图</small></button>
                  <button data-chat-tool="quiz" type="button"><strong>生成练习题</strong><small>题目、答案、解析与难度</small></button>
                  <button data-chat-tool="code_case" type="button"><strong>生成代码案例</strong><small>任务、测试与参考答案</small></button>
                  <button data-chat-tool="further_reading" type="button"><strong>生成拓展阅读</strong><small>只采用可追溯真实来源</small></button>
                  <button data-chat-tool="resource_pack" type="button"><strong>生成完整资源包</strong><small>生成后进入资源中心管理</small></button>
                </div>
              </div>
              <button id="voiceButton" class="voice-btn" type="button" title="语音输入" aria-label="语音输入">
                <svg class="voice-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
                  <path d="M19 11a7 7 0 0 1-14 0"></path>
                  <path d="M12 18v3"></path><path d="M8 21h8"></path>
                </svg>
              </button>
              <textarea id="chatInput" rows="2" placeholder="输入问题，或使用语音和学习工具"></textarea>
            </div>
            <button id="chatSend" class="lumina-send-btn" type="submit" title="发送问题"><span>发送</span><b>↑</b></button>
            <div id="voiceStatus" class="voice-status" aria-live="polite"></div>
          </form>
        </main>
      </section>

      <div id="modeModal" class="modal-backdrop" hidden>
        <section class="mode-modal" role="dialog" aria-modal="true" aria-labelledby="modeTitle">
          <div class="modal-head">
            <div><span class="modal-kicker">Answer Engine</span><h2 id="modeTitle">选择回答模式</h2><p>模式只决定主要回答引擎；画像抽取、资源生成与审核会在后台按任务运行。</p></div>
            <button id="modeClose" class="icon-btn" type="button" title="关闭">×</button>
          </div>
          <div class="mode-options">
            <button class="mode-option active" data-mode="flash" type="button"><strong>本地快速</strong><span>优先使用当前课程知识空间，响应更快，适合简短查询。</span></button>
            <button class="mode-option" data-mode="spark" type="button"><strong>Spark X</strong><span>调用讯飞星火大模型，适合需要更自然表达和连续讲解的问题。</span></button>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="/static/campus.js?v=2"></script>
  <script src="/static/chat.js?v=11"></script>
</body>
</html>
