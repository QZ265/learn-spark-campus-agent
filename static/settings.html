<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>账户设置｜Campus Lumina</title><link rel="stylesheet" href="/static/styles.css?v=12" /></head>
<body class="lumina-body settings-body"><main class="lumina-stage"><section class="lumina-shell two-column-shell">
  <aside class="lumina-sidebar"><a class="lumina-brand" href="/"><span class="lumina-brand-mark" aria-hidden="true"><i></i></span><span><strong>Campus Lumina</strong><small>校园智能学习中枢</small></span></a><nav class="lumina-nav" aria-label="主导航"><a href="/"><span class="nav-symbol">⌂</span>Dashboard</a><a href="/chat"><span class="nav-symbol">✦</span>智能 Agent</a><a href="/profile"><span class="nav-symbol">◌</span>学生画像</a><a href="/plan"><span class="nav-symbol">▦</span>学习计划</a><a href="/resources"><span class="nav-symbol">▤</span>资源中心</a><a class="active" href="/settings"><span class="nav-symbol">⚙</span>账户设置</a></nav><div class="settings-user-summary"><div class="settings-avatar" data-user-avatar><span data-user-initial>学</span></div><strong data-user-name>同学</strong><span>本机个人空间</span></div></aside>
  <section class="page-workspace"><header class="page-topbar"><div class="page-heading"><span>Preferences</span><h1>账户设置</h1><p>管理个人资料、平台外观与 AI 回答偏好。</p></div><div id="settingsSaveState" class="save-state">更改会保存在当前浏览器</div></header>
    <main class="page-content settings-content">
      <nav class="settings-tabs" aria-label="设置分类"><button class="active" data-settings-tab="profile" type="button">基本资料</button><button data-settings-tab="appearance" type="button">外观设置</button><button data-settings-tab="ai" type="button">AI 回答偏好</button></nav>
      <section class="settings-panel active" data-settings-panel="profile"><div class="panel-heading"><div><span>Profile</span><h2>基本资料</h2></div><small>用于 Dashboard 和全局画像展示</small></div><form id="profileSettingsForm" class="settings-form"><div class="avatar-editor wide"><div class="settings-avatar large" data-user-avatar><span data-user-initial>学</span></div><label>头像图片地址<input name="avatar" type="url" placeholder="https://..." /></label></div><label>昵称<input name="nickname" maxlength="40" /></label><label>姓名<input name="name" maxlength="40" /></label><label>专业<input name="major" maxlength="80" /></label><label>年级<input name="grade" maxlength="40" /></label><label>学校<input name="school" maxlength="100" /></label><label class="wide">简介<textarea name="bio" rows="4" maxlength="500"></textarea></label><div class="settings-submit wide"><button class="primary-action" type="submit">保存基本资料</button></div></form></section>
      <section class="settings-panel" data-settings-panel="appearance"><div class="panel-heading"><div><span>Appearance</span><h2>外观设置</h2></div><small>保存后立即在全站生效</small></div><form id="appearanceSettingsForm" class="settings-form"><fieldset class="wide choice-field"><legend>显示模式</legend><label><input name="mode" type="radio" value="light" />浅色</label><label><input name="mode" type="radio" value="dark" />深色</label><label><input name="mode" type="radio" value="system" />跟随系统</label></fieldset><fieldset class="wide choice-field accent-field"><legend>主题色</legend><label><input name="accent" type="radio" value="indigo" /><span class="accent-swatch indigo"></span>靛蓝</label><label><input name="accent" type="radio" value="teal" /><span class="accent-swatch teal"></span>青绿</label><label><input name="accent" type="radio" value="orange" /><span class="accent-swatch orange"></span>暖橙</label></fieldset><label>字体大小<select name="fontSize"><option value="small">较小</option><option value="medium">标准</option><option value="large">较大</option></select></label><label>显示密度<select name="density"><option value="comfortable">舒适</option><option value="compact">紧凑</option></select></label><div class="settings-submit wide"><button class="primary-action" type="submit">保存外观设置</button></div></form></section>
      <section class="settings-panel" data-settings-panel="ai"><div class="panel-heading"><div><span>Answer Preferences</span><h2>AI 回答偏好</h2></div><small>这些是表达偏好，不能覆盖安全与课程隔离规则</small></div><form id="aiSettingsForm" class="settings-form"><label>回答详细程度<select name="detail"><option value="concise">简洁</option><option value="detailed">详细</option></select></label><label>讲解顺序<select name="explainOrder"><option value="concept">先讲概念</option><option value="example">先举例</option></select></label><label>学习取向<select name="orientation"><option value="balanced">均衡</option><option value="theory">偏理论</option><option value="practice_questions">偏做题</option><option value="hands_on">偏实践</option></select></label><div class="toggle-stack wide"><label><input name="preferCode" type="checkbox" />代码问题优先给出可运行示例</label><label><input name="stepByStep" type="checkbox" />复杂问题分步骤说明</label><label><input name="requireCitations" type="checkbox" />有教材知识库时优先提供引用</label></div><label class="wide">自定义附加指令<textarea name="customInstruction" rows="4" maxlength="800" placeholder="例如：专业术语保留英文原名。不要填写系统提示词或密钥。"></textarea></label><div class="preference-notice wide">回答偏好当前保存在本机；后端尚未提供专用偏好字段，因此不会静默拼接到学生问题中。</div><div class="settings-submit wide"><button class="primary-action" type="submit">保存回答偏好</button></div></form></section>
    </main>
  </section>
</section></main><script src="/static/campus.js?v=2"></script><script src="/static/settings.js?v=2"></script></body></html>
