<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyLearnSpark｜项目入口</title>
  <style>
    :root{--text:#172033;--muted:#667085;--line:#e6eaf2;--primary:#2457e6;--soft:#edf3ff;--bg:#f6f8fc;--panel:#fff}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 15% 10%,#ddebff,transparent 32%),var(--bg);font-family:Inter,"Microsoft YaHei",Arial,sans-serif;color:var(--text)}
    main{width:min(920px,calc(100% - 32px));background:var(--panel);border:1px solid var(--line);border-radius:24px;box-shadow:0 24px 70px rgba(23,32,51,.1);padding:30px}
    .brand{display:flex;align-items:center;gap:14px;margin-bottom:26px}
    .logo{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,#6fa8ff,#2457e6);display:grid;place-items:center;color:#fff;font-weight:900;font-size:20px}
    h1{margin:0;font-size:32px;line-height:1.2}
    p{margin:8px 0 0;color:var(--muted);line-height:1.75}
    .status{margin:18px 0 24px;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#f8fafc;color:#344054;font-weight:800}
    .status.ok{background:#eaf8f1;border-color:#ccebdd;color:#0b7a50}
    .status.warn{background:#fff7ed;border-color:#fed7aa;color:#b45309}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    a{display:grid;gap:8px;text-decoration:none;color:inherit;border:1px solid var(--line);border-radius:16px;background:#fbfcff;padding:18px;min-height:142px;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
    a:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(36,87,230,.14);border-color:#b9ccff}
    a.primary{background:linear-gradient(135deg,#2457e6,#163aa8);color:#fff;border-color:#2457e6}
    a.primary span{color:#e7edff}
    strong{font-size:18px}
    span{color:var(--muted);line-height:1.6;font-size:14px}
    .tips{margin-top:20px;border-top:1px solid var(--line);padding-top:18px;color:var(--muted);font-size:14px;line-height:1.8}
    code{background:var(--soft);color:#2457e6;border-radius:7px;padding:2px 6px}
    @media(max-width:760px){main{padding:22px}.grid{grid-template-columns:1fr}h1{font-size:26px}a{min-height:auto}}
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <div class="logo">Py</div>
      <div>
        <h1>PyLearnSpark 项目入口</h1>
        <p>从这里进入主页、智能答疑和动态学生画像。建议先启动本地服务，再点击入口。</p>
      </div>
    </div>

    <div id="status" class="status">正在检测本地服务...</div>

    <section class="grid" aria-label="页面入口">
      <a class="primary" href="http://127.0.0.1:8000/">
        <strong>打开主页</strong>
        <span>作品概念展示、系统能力和入口导航。</span>
      </a>
      <a href="http://127.0.0.1:8000/chat">
        <strong>进入智能答疑</strong>
        <span>和学习智能体对话，支持 Spark X 模式、历史对话和语音输入。</span>
      </a>
      <a href="http://127.0.0.1:8000/profile">
        <strong>动态学生画像</strong>
        <span>查看画像值、原始证据、来源、置信度和最近变化。</span>
      </a>
    </section>

    <div class="tips">
      如果提示服务未启动，请在项目目录运行：<code>START_SERVER_WINDOWS.bat</code>。<br />
      <code>OPEN_DEMO_NO_SERVER.html</code> 只提供启动说明，不包含模拟 Agent 或假资源。
    </div>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    fetch('http://127.0.0.1:8000/api/health')
      .then(res => res.json())
      .then(data => {
        statusEl.className = 'status ok';
        statusEl.textContent = `本地服务已启动 · 星辰：${data.astron_configured ? '已配置' : '未配置'} · Spark：${data.mode === 'spark' ? data.model : '未配置'} · 语音识别：${data.asr_configured ? '已配置' : '未配置'}`;
      })
      .catch(() => {
        statusEl.className = 'status warn';
        statusEl.textContent = '还没有检测到本地服务。请先启动服务，再点击主页或答疑入口。';
      });
  </script>
</body>
</html>
