<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyLearnSpark｜需要启动服务</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f5f7fb;color:#172033;font-family:Arial,"Microsoft YaHei",sans-serif}main{width:min(680px,calc(100% - 32px));background:#fff;border:1px solid #e6eaf2;border-radius:16px;padding:28px;box-shadow:0 18px 50px rgba(23,32,51,.08)}h1{margin:0 0 12px;font-size:30px}p{color:#667085;line-height:1.8}code{background:#edf3ff;color:#2457e6;border-radius:6px;padding:3px 7px}a{display:inline-block;margin-top:12px;background:#2457e6;color:#fff;text-decoration:none;border-radius:10px;padding:11px 15px;font-weight:800}
  </style>
</head>
<body>
  <main>
    <h1>请先启动 PyLearnSpark 服务</h1>
    <p>动态画像、星辰 Agent、资源生成、引用审核和历史资源都依赖后端接口。这个文件不提供模拟数据或离线假功能。</p>
    <p>macOS / Linux 运行 <code>./START_SERVER_MAC_LINUX.sh</code>；Windows 双击 <code>START_SERVER_WINDOWS.bat</code>。</p>
    <a href="http://127.0.0.1:8000/">服务启动后打开主页</a>
  </main>
</body>
</html>
